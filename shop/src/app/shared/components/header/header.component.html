<header class="header">
  <a routerLink="/catalog" class="header__logo">ShopApp</a>
  <nav class="header__nav">
    <a routerLink="/catalog" routerLinkActive="active" class="header__link">Catalog</a>
    <a routerLink="/checkout" class="header__basket" aria-label="Go to checkout">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      @if (cartService.count() > 0) {
        <span class="header__badge">{{ cartService.count() }}</span>
      }
    </a>
  </nav>
</header>
